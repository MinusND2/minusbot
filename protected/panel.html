<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overlay Control Panel</title>
    <style>
        :root {
            --bg: #060b18;
            --bg-soft: #0d1630;
            --card: rgba(18, 28, 53, 0.75);
            --card-border: rgba(148, 163, 184, 0.2);
            --text: #e7ecf8;
            --muted: #9aa8c7;
            --primary: #4f7cff;
            --primary-hover: #6d91ff;
            --danger: #ff4d6d;
            --success: #22c55e;
            --radius: 16px;
            --shadow: 0 14px 36px rgba(0, 0, 0, 0.35);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: Inter, Segoe UI, Roboto, Arial, sans-serif;
            color: var(--text);
            background:
                radial-gradient(1200px 700px at -10% -20%, #1f3a8a 0%, transparent 60%),
                radial-gradient(1000px 600px at 110% 0%, #7c3aed 0%, transparent 55%),
                linear-gradient(180deg, #060b18 0%, #081022 100%);
            padding: 30px 18px 50px;
        }
        .shell {
            max-width: 1100px;
            margin: 0 auto;
        }
        .card {
            backdrop-filter: blur(14px);
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 22px;
            margin-bottom: 18px;
        }
        h1, h2, h3 { margin-top: 0; }
        h1 {
            margin-bottom: 8px;
            font-size: clamp(26px, 4vw, 40px);
            letter-spacing: 0.2px;
        }
        input, button {
            min-height: 44px;
            padding: 10px 14px;
            border-radius: 12px;
            border: 1px solid #38486f;
            background: #0f1a34;
            color: var(--text);
            font-size: 15px;
            transition: 0.2s ease;
        }
        input::placeholder { color: #7f91b8; }
        input:focus {
            outline: none;
            border-color: #7fa0ff;
            box-shadow: 0 0 0 4px rgba(79, 124, 255, 0.2);
        }
        button {
            cursor: pointer;
            border: none;
            background: var(--primary);
            font-weight: 600;
            letter-spacing: 0.1px;
        }
        button:hover { background: var(--primary-hover); transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        .ghost {
            background: transparent;
            border: 1px solid #3b4d79;
        }
        .ghost:hover { background: #152141; }
        .danger { background: var(--danger); }
        .danger:hover { background: #ff6683; }
        .danger-ghost {
            background: transparent;
            border: 1px solid rgba(255, 77, 109, 0.6);
            color: #ff9ab0;
        }
        .danger-ghost:hover {
            background: rgba(255, 77, 109, 0.18);
            color: #ffd7e0;
        }
        .row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }
        .row + .row { margin-top: 12px; }
        .space-between { justify-content: space-between; }
        .muted {
            color: var(--muted);
            font-size: 14px;
            line-height: 1.5;
            margin: 0;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr;
            gap: 14px;
            margin-top: 14px;
        }
        .stream {
            border: 1px solid rgba(123, 151, 220, 0.35);
            border-radius: 14px;
            padding: 14px;
            background: rgba(9, 17, 36, 0.85);
        }
        .stream h3 {
            margin-bottom: 6px;
            font-size: 18px;
        }
        .tags {
            display: inline-flex;
            gap: 8px;
            flex-wrap: wrap;
            margin: 8px 0 10px;
        }
        .tag {
            border: 1px solid #3d5180;
            border-radius: 999px;
            padding: 3px 10px;
            color: #c5d2f2;
            font-size: 12px;
        }
        .links {
            margin-top: 8px;
            display: grid;
            gap: 8px;
        }
        .status {
            margin-top: 10px;
            border-radius: 12px;
            padding: 10px 12px;
            font-size: 14px;
            display: none;
            border: 1px solid transparent;
        }
        .status.show { display: block; }
        .status.success {
            color: #d1fae5;
            background: rgba(34, 197, 94, 0.14);
            border-color: rgba(34, 197, 94, 0.35);
        }
        .status.error {
            color: #fee2e2;
            background: rgba(239, 68, 68, 0.15);
            border-color: rgba(239, 68, 68, 0.35);
        }
        .auth-note {
            margin-top: 10px;
            font-size: 13px;
            color: #9db0d9;
        }
        .hidden { display: none; }
        .modstats-box {
            margin-top: 14px;
            border: 1px solid rgba(123, 151, 220, 0.35);
            border-radius: 14px;
            padding: 14px;
            background: rgba(9, 17, 36, 0.85);
        }
        .modstats-grid {
            display: grid;
            grid-template-columns: 1fr 160px 160px auto;
            gap: 10px;
            align-items: end;
            margin-top: 8px;
        }
        .modstats-grid label {
            display: block;
            font-size: 12px;
            color: #9db0d9;
            margin-bottom: 5px;
        }
        .modstats-grid select,
        .modstats-grid input {
            width: 100%;
        }
        .modstats-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        .modstats-table th,
        .modstats-table td {
            text-align: left;
            padding: 9px 8px;
            border-bottom: 1px solid #24345d;
            font-size: 14px;
        }
        .modstats-table th {
            color: #9fb5df;
            font-weight: 600;
        }
        .num {
            font-variant-numeric: tabular-nums;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="shell">
        <div id="authCard" class="card">
            <h2>Login</h2>
            <div class="grid-2">
                <input id="email" type="email" placeholder="E-Mail">
                <input id="password" type="password" placeholder="Passwort">
            </div>
            <div class="row" style="margin-top:12px;">
                <button id="loginBtn">Einloggen</button>
            </div>
            <p class="auth-note">Zugang nur mit von dir freigegebenem Account (Boss erstellt die Logins).</p>
            <div id="globalStatus" class="status"></div>
        </div>

        <div id="appCard" class="card hidden">
            <div class="row space-between">
                <h2 style="margin:0;">Meine Overlays</h2>
                <button id="logoutBtn" class="danger">Logout</button>
            </div>
            <p class="muted" style="margin-top:8px;">Erzeuge pro Streamer ein eigenes Overlay und teile nur den Overlay-Link.</p>
            <div class="row" style="margin-top:12px;">
                <input id="streamName" type="text" placeholder="Neuer Overlay-Name (z. B. Streamer Max)" style="min-width:320px; flex:1;">
                <button id="createBtn">Overlay erstellen</button>
            </div>
            <div id="streams" class="links"></div>

            <div class="modstats-box">
                <div class="row space-between">
                    <h3 style="margin:0;">Mod Tracking</h3>
                    <span id="modStatsInfo" class="muted">Lade Daten ...</span>
                </div>
                <div class="modstats-grid">
                    <div>
                        <label for="channelSelect">Streamer</label>
                        <select id="channelSelect">
                            <option value="">Alle Streamer</option>
                        </select>
                    </div>
                    <div>
                        <label for="fromDate">Von</label>
                        <input id="fromDate" type="date">
                    </div>
                    <div>
                        <label for="toDate">Bis</label>
                        <input id="toDate" type="date">
                    </div>
                    <div>
                        <button type="button" id="refreshModStatsBtn">Aktualisieren</button>
                    </div>
                </div>
                <div id="modStatsContent" class="links" style="margin-top:10px;"></div>
            </div>
        </div>
    </div>

    <script src="../public/app-config.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
    <script src="../public/realtime-store.js"></script>
    <script>
        const authCard = document.getElementById("authCard");
        const appCard = document.getElementById("appCard");
        const emailEl = document.getElementById("email");
        const passwordEl = document.getElementById("password");
        const streamNameEl = document.getElementById("streamName");
        const streamsEl = document.getElementById("streams");
        const statusEl = document.getElementById("globalStatus");
        const channelSelectEl = document.getElementById("channelSelect");
        const fromDateEl = document.getElementById("fromDate");
        const toDateEl = document.getElementById("toDate");
        const refreshModStatsBtnEl = document.getElementById("refreshModStatsBtn");
        const modStatsInfoEl = document.getElementById("modStatsInfo");
        const modStatsContentEl = document.getElementById("modStatsContent");
        const MODSTATS_API_BASE =
            new URLSearchParams(window.location.search).get("api") ||
            window.BINGO_CONFIG.modstatsApiBase ||
            "https://minusbot.onrender.com";
        let latestChannels = [];

        function showStatus(text, kind) {
            statusEl.textContent = text;
            statusEl.className = "status show " + (kind || "success");
        }

        function clearStatus() {
            statusEl.className = "status";
            statusEl.textContent = "";
        }

        window.addEventListener("error", (event) => {
            showStatus("JS-Fehler: " + (event.message || "Unbekannter Fehler"), "error");
        });

        window.addEventListener("unhandledrejection", (event) => {
            const msg = event?.reason?.message || String(event.reason || "Promise-Fehler");
            showStatus("Async-Fehler: " + msg, "error");
        });

        function baseUrl() {
            return window.location.origin;
        }

        function streamLinks(streamId) {
            const q = "?stream=" + encodeURIComponent(streamId);
            return {
                overlayBingo: baseUrl() + "/public/index.html" + q,
                overlayScore: baseUrl() + "/public/scoreboard.html" + q,
                adminBingo: baseUrl() + "/protected/admin.html" + q,
                adminScore: baseUrl() + "/protected/scoreboard-admin.html" + q
            };
        }

        async function copy(text) {
            await navigator.clipboard.writeText(text);
            showStatus("Link kopiert.", "success");
        }

        function renderStreams(items) {
            streamsEl.innerHTML = "";
            if (!items.length) {
                streamsEl.innerHTML = "<p class='muted'>Noch kein Overlay vorhanden.</p>";
                return;
            }
            items.forEach((item) => {
                const links = streamLinks(item.id);
                const div = document.createElement("div");
                div.className = "stream";
                div.innerHTML = `
                    <h3>${item.name}</h3>
                    <div class="tags">
                        <span class="tag">ID: ${item.id}</span>
                    </div>
                    <div class="row">
                        <button type="button" data-url="${links.adminBingo}" data-open="1">Bingo Admin</button>
                        <button type="button" data-url="${links.adminScore}" data-open="1">Score Admin</button>
                    </div>
                    <div class="row">
                        <button type="button" data-url="${links.overlayBingo}" data-copy="1" class="ghost">Bingo Overlay-Link kopieren</button>
                        <button type="button" data-url="${links.overlayScore}" data-copy="1" class="ghost">Score Overlay-Link kopieren</button>
                        <button type="button" data-id="${item.id}" data-delete="1" class="danger-ghost">Overlay löschen</button>
                    </div>
                `;
                streamsEl.appendChild(div);
            });

            streamsEl.querySelectorAll("button[data-open='1']").forEach((btn) => {
                btn.addEventListener("click", () => window.open(btn.dataset.url, "_blank"));
            });
            streamsEl.querySelectorAll("button[data-copy='1']").forEach((btn) => {
                btn.addEventListener("click", () => copy(btn.dataset.url));
            });
            streamsEl.querySelectorAll("button[data-delete='1']").forEach((btn) => {
                btn.addEventListener("click", async () => {
                    const user = firebase.auth().currentUser;
                    if (!user) return;
                    const streamId = btn.dataset.id;
                    if (!confirm("Overlay wirklich löschen? Dieser Schritt kann nicht rückgängig gemacht werden.")) {
                        return;
                    }
                    try {
                        await BingoStore.deleteStream(streamId, user.uid);
                        await reloadStreams(user);
                        showStatus("Overlay gelöscht.", "success");
                    } catch (err) {
                        showStatus(err.message || "Löschen fehlgeschlagen.", "error");
                    }
                });
            });
        }

        async function reloadStreams(user) {
            const list = await BingoStore.listOwnedStreams(user.uid);
            renderStreams(list);
        }

        function escapeHtml(value) {
            return String(value)
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;");
        }

        function renderModTable(channel) {
            const mods = Object.values(channel.mods || {})
                .sort((a, b) => (b.timeouts + b.bans) - (a.timeouts + a.bans));
            if (!mods.length) {
                return `<div class="muted">Keine Einträge im gewählten Zeitraum.</div>`;
            }
            const rows = mods.map((m) => `
                <tr>
                    <td>${escapeHtml(m.moderatorName || "Unknown")}</td>
                    <td class="num">${m.timeouts || 0}</td>
                    <td class="num">${m.bans || 0}</td>
                    <td class="num">${(m.timeouts || 0) + (m.bans || 0)}</td>
                </tr>
            `).join("");
            return `
                <table class="modstats-table">
                    <thead>
                        <tr>
                            <th>Mod</th>
                            <th>Timeouts</th>
                            <th>Bans</th>
                            <th>Gesamt</th>
                        </tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>
            `;
        }

        function renderModStatsView() {
            const selected = channelSelectEl.value;
            const channels = selected
                ? latestChannels.filter((c) => c.broadcasterId === selected)
                : latestChannels;

            if (!channels.length) {
                modStatsContentEl.innerHTML = `<div class="muted">Keine Daten für die Auswahl.</div>`;
                return;
            }

            modStatsContentEl.innerHTML = channels.map((channel) => `
                <div class="stream">
                    <h3>${escapeHtml(channel.broadcasterName)}</h3>
                    <div class="muted">Bans: ${channel.totals?.bans || 0} | Timeouts: ${channel.totals?.timeouts || 0}</div>
                    ${renderModTable(channel)}
                </div>
            `).join("");
        }

        async function loadModStats() {
            const root = MODSTATS_API_BASE.replace(/\/$/, "");
            const from = fromDateEl.value.trim();
            const to = toDateEl.value.trim();
            const params = new URLSearchParams();
            if (from) params.set("from", from);
            if (to) params.set("to", to);
            const res = await fetch(`${root}/api/public/modstats?${params.toString()}`);
            if (!res.ok) {
                throw new Error(`Modstats API Fehler (${res.status})`);
            }
            const data = await res.json();
            latestChannels = Array.isArray(data.channels) ? data.channels : [];

            const current = channelSelectEl.value;
            const options = ['<option value="">Alle Streamer</option>']
                .concat(latestChannels.map((c) => `<option value="${c.broadcasterId}">${escapeHtml(c.broadcasterName)}</option>`));
            channelSelectEl.innerHTML = options.join("");
            if (current && latestChannels.some((c) => c.broadcasterId === current)) {
                channelSelectEl.value = current;
            }

            modStatsInfoEl.textContent = `Kanäle: ${latestChannels.length} | API: ${MODSTATS_API_BASE}`;
            renderModStatsView();
        }

        document.getElementById("loginBtn").addEventListener("click", async () => {
            try {
                clearStatus();
                await BingoStore.signIn(emailEl.value.trim(), passwordEl.value);
                showStatus("Erfolgreich eingeloggt.", "success");
            } catch (err) {
                showStatus(err.message || "Login fehlgeschlagen.", "error");
            }
        });

        document.getElementById("logoutBtn").addEventListener("click", async () => {
            await BingoStore.signOut();
        });

        channelSelectEl.addEventListener("change", renderModStatsView);
        refreshModStatsBtnEl.addEventListener("click", async () => {
            try {
                await loadModStats();
                showStatus("Modstats aktualisiert.", "success");
            } catch (err) {
                showStatus(err.message || "Modstats konnten nicht geladen werden.", "error");
            }
        });

        passwordEl.addEventListener("keydown", (event) => {
            if (event.key === "Enter") {
                document.getElementById("loginBtn").click();
            }
        });

        document.getElementById("createBtn").addEventListener("click", async () => {
            const user = firebase.auth().currentUser;
            if (!user) return;
            try {
                const streamId = await BingoStore.createStream(streamNameEl.value, user.uid);
                streamNameEl.value = "";
                await reloadStreams(user);
                const links = streamLinks(streamId);
                await copy(links.overlayBingo);
            } catch (err) {
                showStatus(err.message || "Overlay konnte nicht erstellt werden.", "error");
            }
        });

        BingoStore.onAuthStateChanged(async (user) => {
            if (!user) {
                authCard.classList.remove("hidden");
                appCard.classList.add("hidden");
                streamsEl.innerHTML = "";
                showStatus("Nicht eingeloggt. Bitte anmelden.", "success");
                return;
            }
            authCard.classList.add("hidden");
            appCard.classList.remove("hidden");
            await reloadStreams(user);
            try {
                await loadModStats();
            } catch (err) {
                showStatus(err.message || "Modstats konnten nicht geladen werden.", "error");
            }
        });

        if (!window.firebase) {
            showStatus("Firebase SDK fehlt auf der Seite.", "error");
        } else if (!firebase.auth) {
            showStatus("Firebase Auth SDK fehlt (firebase-auth-compat).", "error");
        } else {
            showStatus("Panel geladen. Login bereit.", "success");
        }
    </script>
</body>
</html>
