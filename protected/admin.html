<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Admin Panel</title>
    <link rel="stylesheet" href="../public/style.css">
    <style>
        body {
            background-color: #f0f0f0; /* Visible background for admin */
            flex-direction: column;
        }
        .style-panel {
            margin-top: 16px;
            text-align: left;
            display: inline-block;
            background: #ffffff;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 12px;
            min-width: 460px;
        }
        .style-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(200px, 1fr));
            gap: 10px 16px;
        }
        .style-grid label {
            font-size: 12px;
            color: #555;
            display: block;
            margin-bottom: 4px;
        }
        .style-grid input[type="number"],
        .style-grid input[type="color"] {
            width: 100%;
        }
        #styleSaveStatus {
            margin-top: 8px;
            font-size: 13px;
            color: #444;
        }
    </style>
</head>
<body class="admin-mode">
    <h1 id="title">Bingo Admin / Mod Panel</h1>
    <div class="bingo-container">
        <div class="bingo-board" id="board">
            <!-- Cells will be generated here -->
        </div>
    </div>

    <div class="admin-controls">
        <button id="editBtn" style="background-color: #2196F3;">Texte bearbeiten</button>
        <button id="saveBtn" style="background-color: #4CAF50; display: none;">Speichern</button>
        <button id="cancelBtn" style="background-color: #f44336; display: none;">Abbrechen</button>
        <button id="resetBtn">Reset Board</button>
        <br><br>
        <a id="scoreboardAdminLink" href="/protected/scoreboard-admin.html" style="text-decoration: none;">
            <button style="background-color: #9C27B0;">Zum Scoreboard Admin (Tor Overlay)</button>
        </a>
        <a href="/protected/panel.html" style="text-decoration: none;">
            <button style="background-color: #333;">Zur Overlay-Auswahl</button>
        </a>

        <div class="style-panel">
            <h3 style="margin-top:0;">Bingo Design</h3>
            <div class="style-grid">
                <div>
                    <label for="fontSizeInput">Schriftgröße</label>
                    <input id="fontSizeInput" type="number" min="10" max="64" value="34">
                </div>
                <div>
                    <label for="textColorInput">Schriftfarbe</label>
                    <input id="textColorInput" type="color" value="#111111">
                </div>
                <div>
                    <label for="boardBgInput">Board Hintergrund</label>
                    <input id="boardBgInput" type="color" value="#ffffff">
                </div>
                <div>
                    <label for="cellBgInput">Felder Hintergrund</label>
                    <input id="cellBgInput" type="color" value="#ffffff">
                </div>
                <div>
                    <label for="checkedBgInput">Markiert Hintergrund</label>
                    <input id="checkedBgInput" type="color" value="#bdf7bd">
                </div>
            </div>
            <button id="saveStyleBtn" style="background-color:#673AB7; margin-top:10px;">Design speichern</button>
            <div id="styleSaveStatus"></div>
        </div>
    </div>

    <script src="../public/app-config.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
    <script src="../public/realtime-store.js"></script>
    <script>
        const streamId = BingoStore.getActiveStreamId();
        const board = document.getElementById('board');
        const resetBtn = document.getElementById('resetBtn');
        const editBtn = document.getElementById('editBtn');
        const saveBtn = document.getElementById('saveBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        const titleEl = document.getElementById('title');
        const scoreboardAdminLink = document.getElementById('scoreboardAdminLink');
        const fontSizeInput = document.getElementById('fontSizeInput');
        const textColorInput = document.getElementById('textColorInput');
        const boardBgInput = document.getElementById('boardBgInput');
        const cellBgInput = document.getElementById('cellBgInput');
        const checkedBgInput = document.getElementById('checkedBgInput');
        const saveStyleBtn = document.getElementById('saveStyleBtn');
        const styleSaveStatus = document.getElementById('styleSaveStatus');

        let currentTerms = [];
        let cells = [];
        let isEditing = false;
        let currentBingoStyle = null;
        titleEl.textContent = "Bingo Admin: " + streamId;
        scoreboardAdminLink.href = "/protected/scoreboard-admin.html?stream=" + encodeURIComponent(streamId);

        function renderBoard(terms) {
            board.innerHTML = '';
            cells = [];
            terms.forEach((term, index) => {
                const cell = document.createElement('div');
                cell.classList.add('cell');
                cell.textContent = term;
                cell.dataset.index = index;
                
                // Click listener
                cell.addEventListener('click', () => {
                    if (!isEditing) {
                        BingoStore.toggleCell(index, streamId);
                    }
                });

                board.appendChild(cell);
                cells.push(cell);
            });
        }

        BingoStore.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = "/protected/panel.html";
                return;
            }
            try {
                await BingoStore.requireOwner(streamId, user.uid);
                await BingoStore.ensureInitialized(streamId);
                BingoStore.subscribe((data) => {
                    currentTerms = data.terms;
                    renderBoard(currentTerms);
                    updateBoard(data.state);
                    currentBingoStyle = data.bingoStyle || currentBingoStyle;
                    applyBingoStyle(currentBingoStyle);
                    syncStyleInputs(currentBingoStyle);
                }, streamId);
                bindDirectBingoStyleListener();
            } catch (err) {
                alert(err.message || "Zugriff verweigert.");
                window.location.href = "/protected/panel.html";
            }
        });

        function updateBoard(state) {
            if (!state) return;
            state.forEach((checked, index) => {
                if (cells[index]) {
                    if (checked) {
                        cells[index].classList.add('checked');
                    } else {
                        cells[index].classList.remove('checked');
                    }
                }
            });
        }

        // Edit Mode Logic
        editBtn.addEventListener('click', () => {
            isEditing = true;
            board.classList.add('editing'); // Add visual cue if needed
            cells.forEach(cell => {
                cell.contentEditable = true;
                cell.style.border = "2px dashed #2196F3";
                cell.style.backgroundColor = "#fff"; // Reset color to make text readable
                cell.classList.remove('checked'); // Hide checked state while editing
            });
            
            editBtn.style.display = 'none';
            resetBtn.style.display = 'none';
            saveBtn.style.display = 'inline-block';
            cancelBtn.style.display = 'inline-block';
        });

        saveBtn.addEventListener('click', () => {
            const newTerms = [];
            cells.forEach(cell => {
                newTerms.push(cell.textContent.trim());
            });

            if (confirm('Änderungen speichern und an alle senden?')) {
                BingoStore.setTerms(newTerms, streamId);
                exitEditMode();
            }
        });

        cancelBtn.addEventListener('click', () => {
            renderBoard(currentTerms); // Re-render to discard changes
            exitEditMode();
            location.reload(); // Simplest way to restore state correctly without complex logic
        });

        function exitEditMode() {
            isEditing = false;
            board.classList.remove('editing');
            cells.forEach(cell => {
                cell.contentEditable = false;
                cell.style.border = "";
                cell.style.backgroundColor = "";
            });
            
            editBtn.style.display = 'inline-block';
            resetBtn.style.display = 'inline-block';
            saveBtn.style.display = 'none';
            cancelBtn.style.display = 'none';
        }

        resetBtn.addEventListener('click', () => {
            if(confirm('Wirklich alles zurücksetzen?')) {
                BingoStore.resetBoard(streamId);
            }
        });

        saveStyleBtn.addEventListener('click', async () => {
            const nextStyle = readStyleInputs();
            currentBingoStyle = nextStyle;
            applyBingoStyle(nextStyle);
            styleSaveStatus.textContent = 'Speichere...';
            styleSaveStatus.style.color = '#444';
            try {
                // Direct Firebase write so this works even with cached old realtime-store.js.
                await firebase.database().ref(`streams/${streamId}/data`).update({
                    bingoStyle: nextStyle,
                    updatedAt: Date.now()
                });
                styleSaveStatus.textContent = 'Design gespeichert.';
                styleSaveStatus.style.color = '#2e7d32';
            } catch (err) {
                styleSaveStatus.textContent = `Speichern fehlgeschlagen: ${err.message || err}`;
                styleSaveStatus.style.color = '#c62828';
            }
        });

        function readStyleInputs() {
            return {
                fontSize: Number(fontSizeInput.value) || 34,
                textColor: textColorInput.value || '#111111',
                boardBackgroundColor: boardBgInput.value || '#ffffff',
                cellBackgroundColor: cellBgInput.value || '#ffffff',
                checkedBackgroundColor: checkedBgInput.value || '#bdf7bd'
            };
        }

        function syncStyleInputs(style) {
            if (!style) return;
            fontSizeInput.value = style.fontSize ?? 34;
            textColorInput.value = style.textColor ?? '#111111';
            boardBgInput.value = style.boardBackgroundColor ?? '#ffffff';
            cellBgInput.value = style.cellBackgroundColor ?? '#ffffff';
            checkedBgInput.value = style.checkedBackgroundColor ?? '#bdf7bd';
        }

        function applyBingoStyle(style) {
            if (!style) return;
            const root = document.documentElement;
            root.style.setProperty('--bingo-font-size', `${style.fontSize ?? 34}px`);
            root.style.setProperty('--bingo-text-color', style.textColor ?? '#111111');
            root.style.setProperty('--bingo-board-bg', style.boardBackgroundColor ?? '#ffffff');
            root.style.setProperty('--bingo-cell-bg', style.cellBackgroundColor ?? '#ffffff');
            root.style.setProperty('--bingo-checked-bg', style.checkedBackgroundColor ?? '#bdf7bd');
        }

        function bindDirectBingoStyleListener() {
            firebase.database().ref(`streams/${streamId}/data/bingoStyle`).on('value', (snap) => {
                const style = snap.val();
                if (!style) return;
                currentBingoStyle = style;
                applyBingoStyle(style);
                syncStyleInputs(style);
            });
        }
    </script>
</body>
</html>
