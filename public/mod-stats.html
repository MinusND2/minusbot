<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mod Stats</title>
  <style>
    body {
      margin: 0;
      font-family: Inter, Segoe UI, Arial, sans-serif;
      background: #0a1020;
      color: #e7ecf8;
      padding: 24px;
    }
    .wrap { max-width: 980px; margin: 0 auto; }
    .card {
      background: #111a33;
      border: 1px solid #2b3a63;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 14px;
    }
    h1 { margin: 0 0 8px; }
    .muted { color: #9cb0d8; }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }
    th, td {
      text-align: left;
      padding: 10px 8px;
      border-bottom: 1px solid #25355e;
    }
    th { color: #a8bbdf; font-weight: 600; }
    .num { font-variant-numeric: tabular-nums; font-weight: 700; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Moderation Stats</h1>
      <div id="meta" class="muted">Lade Daten ...</div>
    </div>
    <div class="card">
      <table>
        <thead>
          <tr>
            <th>Mod</th>
            <th>Timeouts</th>
            <th>Bans</th>
            <th>Gesamt</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const apiBase = params.get("api") || "";
    const channelId = params.get("channelId") || "";
    const rowsEl = document.getElementById("rows");
    const metaEl = document.getElementById("meta");

    if (!apiBase || !channelId) {
      metaEl.textContent = "Bitte ?api=<URL>&channelId=<TWITCH_CHANNEL_ID> setzen.";
      throw new Error("Missing api or channelId");
    }

    async function loadStats() {
      const url = `${apiBase.replace(/\/$/, "")}/api/public/modstats?channelId=${encodeURIComponent(channelId)}`;
      const res = await fetch(url);
      const data = await res.json();
      const channel = data.channel;
      if (!channel) {
        metaEl.textContent = "Noch keine Mod-Aktionen vorhanden.";
        rowsEl.innerHTML = "";
        return;
      }

      metaEl.textContent = `${channel.broadcasterName} | Bans: ${channel.totals.bans} | Timeouts: ${channel.totals.timeouts}`;
      const mods = Object.values(channel.mods || {}).sort((a, b) => (b.timeouts + b.bans) - (a.timeouts + a.bans));

      rowsEl.innerHTML = mods.map((m) => `
        <tr>
          <td>${m.moderatorName}</td>
          <td class="num">${m.timeouts}</td>
          <td class="num">${m.bans}</td>
          <td class="num">${m.timeouts + m.bans}</td>
        </tr>
      `).join("");
    }

    loadStats();
    setInterval(loadStats, 15000);
  </script>
</body>
</html>
