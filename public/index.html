<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Bingo Overlay</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bingo-container">
        <div class="bingo-board" id="board">
            <!-- Cells will be generated here -->
        </div>
    </div>

    <script src="app-config.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
    <script src="realtime-store.js"></script>
    <script>
        const streamId = new URLSearchParams(window.location.search).get('stream') || (window.BINGO_CONFIG && window.BINGO_CONFIG.streamId) || 'default-stream';
        const board = document.getElementById('board');
        let cells = [];

        function renderBoard(terms) {
            board.innerHTML = ''; // Clear board
            cells = [];
            terms.forEach((term, index) => {
                const cell = document.createElement('div');
                cell.classList.add('cell');
                cell.textContent = term;
                cell.dataset.index = index;
                board.appendChild(cell);
                cells.push(cell);
            });
        }

        BingoStore.subscribe((data) => {
            renderBoard(data.terms);
            updateBoard(data.state);
            applyBingoStyle(data.bingoStyle);
        }, streamId);
        bindDirectBingoStyleListener();

        function updateBoard(state) {
            if (!state) return;
            state.forEach((checked, index) => {
                if (cells[index]) {
                    if (checked) {
                        cells[index].classList.add('checked');
                    } else {
                        cells[index].classList.remove('checked');
                    }
                }
            });
        }

        function applyBingoStyle(style) {
            if (!style) return;
            const root = document.documentElement;
            root.style.setProperty('--bingo-font-size', `${style.fontSize ?? 34}px`);
            root.style.setProperty('--bingo-text-color', style.textColor ?? '#111111');
            root.style.setProperty('--bingo-board-bg', style.boardBackgroundColor ?? '#ffffff');
            root.style.setProperty('--bingo-cell-bg', style.cellBackgroundColor ?? '#ffffff');
            root.style.setProperty('--bingo-checked-bg', style.checkedBackgroundColor ?? '#bdf7bd');
        }

        function bindDirectBingoStyleListener() {
            firebase.database().ref(`streams/${streamId}/data/bingoStyle`).on('value', (snap) => {
                applyBingoStyle(snap.val());
            });
        }
    </script>
</body>
</html>
